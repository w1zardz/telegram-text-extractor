<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Telegram Text Extractor</title>
<style>
  body {
    margin: 0;
    width: 280px;
    padding: 14px 16px;
    font: 13px/1.45 -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #1c1c1d;
    color: #e8e8e8;
  }
  h1 { margin: 0 0 8px; font-size: 14px; color: #2481cc; }
  p  { margin: 6px 0; color: #bbb; }
  button {
    width: 100%;
    margin-top: 10px;
    padding: 8px 10px;
    background: #2481cc;
    color: #fff;
    border: 0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  button:hover { background: #1f74b8; }
  .hint {
    margin-top: 10px;
    font-size: 11px;
    color: #777;
  }
  code {
    background: #2c2c2e;
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 11px;
  }
</style>
</head>
<body>
  <h1>📋 Telegram Text Extractor</h1>
  <p>Open <code>web.telegram.org</code> and click the floating 📋 button in the bottom-right corner.</p>
  <button id="open">Toggle panel on current tab</button>
  <p class="hint">Works in any channel or group — including ones where copying is disabled.</p>
  <script src="popup.js"></script>
</body>
</html>
